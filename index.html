<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Welcomeitzfizz</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* 2. Layout (Above the fold) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 15px; /* Requirement: letter-spaced headline */
            text-transform: uppercase;
            margin-bottom: 20px;
            /* Set initial state for GSAP */
            opacity: 0;
            transform: translateY(30px);
        }

        .stats-container {
            margin-bottom: 50px;
        }

        .stat-item {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #ccc;
            /* Set initial state for GSAP staggered reveal */
            opacity: 0;
            transform: translateY(20px);
        }

        .car-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .car {
            width: 350px;
            height: auto;
            z-index: 10;
        }

        .content-section {
            height: 150vh; /* Extra height to allow scrolling */
            background: linear-gradient(to bottom, #000, #1a1a1a);
            display: flex;
            justify-content: center;
            padding-top: 100px;
        }

        h2 { font-size: 2rem; color: #444; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="title">WELCOMEITZFIZZ</h1>

        <div class="stats-container">
            <div class="stat-item"><strong>95%</strong> Success Rate</div>
            <div class="stat-item"><strong>120+</strong> Projects</div>
            <div class="stat-item"><strong>50+</strong> Developers</div>
        </div>

        <div class="car-wrapper">
            <img src="car-removebg-preview.png" alt="Yellow Taxi" class="car" id="movingCar">
        </div>
    </section>

    <section class="content-section">
        <h2>Scroll to drive the car...</h2>
    </section>

    <script>
        // Register the plugin
        gsap.registerPlugin(ScrollTrigger);

        // --- 1. INITIAL LOAD ANIMATION (Intro) ---
        const introTl = gsap.timeline();

        introTl.to(".title", {
            opacity: 1,
            y: 0,
            duration: 1.5,
            ease: "power4.out"
        })
        .to(".stat-item", {
            opacity: 1,
            y: 0,
            duration: 0.8,
            stagger: 0.3, // Requirement: animate one by one with subtle delay
            ease: "power2.out"
        }, "-=0.8"); // Overlap slightly with the title animation

        // --- 2. SCROLL-BASED ANIMATION (Core Feature) ---
        // Ties the car movement to the scroll progress
        gsap.to("#movingCar", {
            x: 800,           // Moves 800px to the right
            scale: 0.8,       // Slightly shrinks as it "drives away"
            rotate: 2,        // Subtle tilt for realism
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",   // Start when hero is at top of viewport
                end: "bottom top",  // End when hero leaves the top
                scrub: 1.5,         // Requirement: tied to scroll progress (smooth interpolation)
                markers: false      // Set to true if you want to see the start/end lines for debugging
            }
        });

        // Optional: Fade out the text as you scroll down
        gsap.to(".title, .stats-container", {
            opacity: 0,
            y: -50,
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "50% top",
                scrub: true
            }
        });
    </script>
</body>
</html>
